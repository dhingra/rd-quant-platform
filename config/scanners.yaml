# Built-in defaults are defined in rdqp.scanners.application.presets.
# Custom scans created in the terminal are written to data/saved_scans.yaml.
scanner:
  alerts_enabled: true
  max_results: 50
  presets:
    momentum:
      min_roc_pct: 0.25
      require_above_vwap: true
    high_rvol:
      min_rvol: 1.5
    gap_up:
      min_gap_pct: 1.0
    gap_down:
      max_gap_pct: -1.0
